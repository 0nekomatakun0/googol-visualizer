<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googol Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw; height: 100vh;
      cursor: none;
      font-family: 'Courier New', monospace;
      user-select: none;
    }

    #universe-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #gear-canvas     { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 2; }
    #counter-canvas  { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 3; pointer-events: none; }

    #cursor {
      position: fixed; width: 10px; height: 10px;
      border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 100;
    }

    /* ─── フェーズラベル ─── */
    #phase-label {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: rgba(220,200,140,0.85);
      font-size: 10px; letter-spacing: 7px; text-transform: uppercase;
      padding: 6px 20px; border: 1px solid rgba(180,150,80,0.2);
      z-index: 10; pointer-events: none;
      transition: opacity 2s ease; white-space: nowrap;
      text-shadow: 0 0 12px rgba(220,190,100,0.6);
    }

    /* ─── チュートリアル（ミュート選択を内包） ─── */
    #tutorial {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 2.2s ease;
      pointer-events: auto;
    }
    #tutorial.fade-out { opacity: 0; pointer-events: none; }

    #tutorial-inner {
      text-align: center;
      padding: 52px 68px 48px;
      max-width: 460px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(180,160,100,0.14);
      position: relative;
    }
    .corner { position: absolute; width: 18px; height: 18px; border-color: rgba(180,150,80,0.35); border-style: solid; }
    .corner.tl { top:0; left:0;  border-width:1px 0 0 1px; }
    .corner.tr { top:0; right:0; border-width:1px 1px 0 0; }
    .corner.bl { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .corner.br { bottom:0; right:0; border-width:0 1px 1px 0; }

    #tutorial-eyebrow {
      font-size: 9px; letter-spacing: 7px;
      color: rgba(180,150,80,0.5); text-transform: uppercase;
      margin-bottom: 36px;
    }

    #tutorial-main {
      font-size: 12px; line-height: 2.7;
      color: rgba(210,205,190,0.65); letter-spacing: 2px;
    }
    #tutorial-main .accent { color: rgba(220,190,110,0.9); }

    /* ─── ミュート選択エリア ─── */
    #sound-choice {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .sound-btn {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 14px 26px;
      border: 1px solid rgba(180,150,80,0.3);
      background: transparent;
      color: rgba(200,180,120,0.7);
      cursor: pointer;
      position: relative;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(200,170,80,0.2);
    }

    /* プライマリ：音あり */
    .sound-btn.primary {
      border-color: rgba(200,170,90,0.5);
      color: rgba(230,205,140,0.9);
    }
    .sound-btn.primary:hover {
      background: rgba(180,150,70,0.12);
      border-color: rgba(220,190,110,0.7);
      color: rgba(240,215,150,1);
    }

    /* セカンダリ：ミュート */
    .sound-btn.secondary {
      border-color: rgba(120,115,105,0.3);
      color: rgba(150,145,135,0.55);
      font-size: 8px;
      letter-spacing: 3px;
      padding: 10px 16px;
    }
    .sound-btn.secondary:hover {
      border-color: rgba(160,155,145,0.45);
      color: rgba(180,175,165,0.75);
    }

    /* パルスアニメ（プライマリのみ） */
    @keyframes btn-breathe {
      0%,100% { box-shadow: 0 0 0 0 rgba(200,170,80,0); }
      50%      { box-shadow: 0 0 10px 2px rgba(200,170,80,0.12); }
    }
    .sound-btn.primary { animation: btn-breathe 3s ease-in-out infinite; }

    /* ─── ミュートアイコン（右下、常時表示） ─── */
    #mute-toggle {
      position: fixed;
      bottom: 20px; right: 22px;
      z-index: 30;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    #mute-toggle.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #mute-toggle svg {
      width: 16px; height: 16px;
      fill: none;
      stroke: rgba(180,160,100,0.45);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s;
    }
    #mute-toggle:hover svg { stroke: rgba(220,195,130,0.8); }

    /* ─── フラッシュ ─── */
    #event-flash {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    #event-flash.active { opacity: 1; transition: opacity 0.1s ease; }

    /* ─── マイルストーンメッセージ ─── */
    #milestone-msg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 22; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.5s ease;
      white-space: nowrap;
      background: rgba(0,0,0,0.5); padding: 18px 36px;
      border: 1px solid rgba(180,160,100,0.2);
    }
    #milestone-msg.active { opacity: 1; }
    #milestone-msg .title {
      font-size: 13px; letter-spacing: 6px;
      color: rgba(230,210,150,0.9); text-transform: uppercase;
      display: block; margin-bottom: 8px;
    }
    #milestone-msg .sub {
      font-size: 9px; letter-spacing: 4px;
      color: rgba(255,255,255,0.35); display: block;
    }

    /* ─── 完走画面 ─── */
    #goal-screen {
      position: fixed; inset: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 3s ease;
    }
    #goal-screen.active { opacity: 1; pointer-events: auto; }
    #goal-inner {
      text-align: center; max-width: 560px;
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(200,180,100,0.3);
      padding: 64px 72px 56px; position: relative;
    }
    .goal-corner { position:absolute; width:22px; height:22px; border-color:rgba(200,180,100,0.5); border-style:solid; }
    .goal-corner.tl{top:0;left:0;border-width:1px 0 0 1px}
    .goal-corner.tr{top:0;right:0;border-width:1px 1px 0 0}
    .goal-corner.bl{bottom:0;left:0;border-width:0 0 1px 1px}
    .goal-corner.br{bottom:0;right:0;border-width:0 1px 1px 0}
    #goal-eyebrow { font-size:9px; letter-spacing:7px; color:rgba(200,170,80,0.6); text-transform:uppercase; margin-bottom:28px; }
    #goal-title { font-size:15px; letter-spacing:5px; line-height:2.2; color:rgba(240,225,170,0.95); text-shadow:0 0 30px rgba(220,190,100,0.5); margin-bottom:28px; }
    #goal-body { font-size:11px; line-height:2.6; letter-spacing:2px; color:rgba(200,195,180,0.7); }
    #goal-body .big { color:rgba(230,210,140,0.9); font-size:13px; }
    #goal-body .small { color:rgba(160,155,140,0.6); font-size:10px; }
  </style>
</head>
<body>
  <canvas id="universe-canvas"></canvas>
  <canvas id="gear-canvas"></canvas>
  <canvas id="counter-canvas"></canvas>
  <div id="cursor"></div>
  <div id="phase-label"></div>

  <!-- チュートリアル（ミュート選択を内包） -->
  <div id="tutorial">
    <div id="tutorial-inner">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="tutorial-eyebrow">Googol Visualizer</div>
      <div id="tutorial-main">
        マウスホイールを回すか<br>
        画面を<span class="accent">スワイプ</span>してください<br>
        <br>
        歯車が宇宙の時間を刻みます<br>
        左端が一周するには<br>
        <span class="accent">10<sup style="font-size:9px">9</sup></span>回転が必要です
      </div>

      <!-- 音選択 -->
      <div id="sound-choice">
        <button class="sound-btn primary" id="btn-sound-on">♪ &nbsp;音あり</button>
        <button class="sound-btn secondary" id="btn-sound-off">消音</button>
      </div>
    </div>
  </div>

  <!-- フラッシュ -->
  <div id="event-flash"></div>
  <div id="milestone-msg">
    <span class="title"></span>
    <span class="sub"></span>
  </div>

  <!-- 完走画面 -->
  <div id="goal-screen">
    <div id="goal-inner">
      <div class="goal-corner tl"></div><div class="goal-corner tr"></div>
      <div class="goal-corner bl"></div><div class="goal-corner br"></div>
      <div id="goal-eyebrow">— Congratulations —</div>
      <div id="goal-title">あなたは宇宙の時計を<br>一周させました</div>
      <div id="goal-body">
        この装置の歯車は <span class="big">10個</span> です<br><br>
        本物の <span class="big">グーゴル可視化装置</span> には<br>
        <span class="big">100個</span> の歯車が必要です<br><br>
        <span class="small">
          あなたが今体験したのは<br>
          グーゴルへの道のりの<br>
          10<sup style="font-size:8px">−91</sup> に過ぎません
        </span>
      </div>
    </div>
  </div>

  <!-- ミュートトグル（開始後に出現） -->
  <div id="mute-toggle" title="ミュート切り替え">
    <!-- 音あり -->
    <svg id="icon-sound" viewBox="0 0 24 24">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <!-- ミュート（hidden） -->
    <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </div>

  <script src="js/canvasDpr.js"></script>
  <script src="js/AssetLoader.js"></script>
  <script src="js/Gear.js"></script>
  <script src="js/TimeController.js"></script>
  <script src="js/UniverseRenderer.js"></script>
  <script src="js/GearRenderer.js"></script>
  <script src="js/CounterRenderer.js"></script>
  <script src="js/InputController.js"></script>
  <script src="js/AudioController.js"></script>
  <script src="js/App.js"></script>
</body>
</html>
