<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googol Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw; height: 100vh;
      cursor: none;
      font-family: 'Courier New', monospace;
      user-select: none;
    }

    #universe-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #gear-canvas     { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 2; }
    #counter-canvas  { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 3; pointer-events: none; }

    #cursor {
      position: fixed; width: 10px; height: 10px;
      border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 100;
    }

    /* ─── フェーズラベル ─── */
    #phase-label {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: rgba(220,200,140,0.85);
      font-size: 10px; letter-spacing: 7px; text-transform: uppercase;
      padding: 6px 20px; border: 1px solid rgba(180,150,80,0.2);
      z-index: 10; pointer-events: none;
      transition: opacity 2s ease; white-space: nowrap;
      text-shadow: 0 0 12px rgba(220,190,100,0.6);
    }

    /* ─── チュートリアル ─── */
    #tutorial {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    #tutorial.fade-out { opacity: 0; }

    #tutorial-inner {
      text-align: center;
      padding: 52px 72px 46px;
      max-width: 480px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(180,160,100,0.15);
      position: relative;
    }
    .corner { position: absolute; width: 18px; height: 18px; border-color: rgba(180,150,80,0.4); border-style: solid; }
    .corner.tl { top:0; left:0;  border-width:1px 0 0 1px; }
    .corner.tr { top:0; right:0; border-width:1px 1px 0 0; }
    .corner.bl { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .corner.br { bottom:0; right:0; border-width:0 1px 1px 0; }

    #tutorial-eyebrow {
      font-size: 9px; letter-spacing: 7px;
      color: rgba(180,150,80,0.55); text-transform: uppercase; margin-bottom: 34px;
    }
    #tutorial-main {
      font-size: 13px; line-height: 2.8;
      color: rgba(220,215,200,0.7); letter-spacing: 2px;
    }
    #tutorial-main .accent { color: rgba(220,190,110,0.95); }
    #tutorial-sub {
      margin-top: 38px; font-size: 8px; letter-spacing: 6px;
      color: rgba(255,255,255,0.18); text-transform: uppercase;
      animation: breathe 2.8s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* ─── フラッシュ ─── */
    #event-flash {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    #event-flash.active { opacity: 1; transition: opacity 0.1s ease; }

    /* ─── マイルストーンメッセージ ─── */
    #milestone-msg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 22; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.5s ease;
      white-space: nowrap;
      background: rgba(0,0,0,0.5); padding: 18px 36px;
      border: 1px solid rgba(180,160,100,0.2);
    }
    #milestone-msg.active { opacity: 1; }
    #milestone-msg .title {
      font-size: 13px; letter-spacing: 6px;
      color: rgba(230,210,150,0.9); text-transform: uppercase;
      display: block; margin-bottom: 8px;
    }
    #milestone-msg .sub {
      font-size: 9px; letter-spacing: 4px;
      color: rgba(255,255,255,0.35); display: block;
    }

    /* ─── 完走画面 ─── */
    #goal-screen {
      position: fixed; inset: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.0);
      pointer-events: none; opacity: 0;
      transition: opacity 3s ease;
    }
    #goal-screen.active { opacity: 1; pointer-events: auto; }

    #goal-inner {
      text-align: center; max-width: 560px;
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(200,180,100,0.3);
      padding: 64px 72px 56px;
      position: relative;
    }
    .goal-corner { position:absolute; width:22px; height:22px; border-color:rgba(200,180,100,0.5); border-style:solid; }
    .goal-corner.tl{top:0;left:0;border-width:1px 0 0 1px}
    .goal-corner.tr{top:0;right:0;border-width:1px 1px 0 0}
    .goal-corner.bl{bottom:0;left:0;border-width:0 0 1px 1px}
    .goal-corner.br{bottom:0;right:0;border-width:0 1px 1px 0}

    #goal-eyebrow {
      font-size: 9px; letter-spacing: 7px; color: rgba(200,170,80,0.6);
      text-transform: uppercase; margin-bottom: 28px;
    }
    #goal-title {
      font-size: 15px; letter-spacing: 5px; line-height: 2.2;
      color: rgba(240,225,170,0.95);
      text-shadow: 0 0 30px rgba(220,190,100,0.5);
      margin-bottom: 28px;
    }
    #goal-body {
      font-size: 11px; line-height: 2.6; letter-spacing: 2px;
      color: rgba(200,195,180,0.7);
    }
    #goal-body .big { color: rgba(230,210,140,0.9); font-size: 13px; }
    #goal-body .small { color: rgba(160,155,140,0.6); font-size: 10px; }

    /* ─── 音声案内 + ミュート ─── */
    #audio-notice {
      position: fixed; bottom: 18px; left: 18px; right: 18px; max-width: 420px;
      z-index: 55;
      padding: 14px 16px 12px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(180,150,80,0.28);
      backdrop-filter: blur(4px);
      pointer-events: auto;
      cursor: default;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    #audio-notice.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(12px);
    }
    #audio-notice .audio-notice-text {
      font-size: 11px; line-height: 1.85;
      letter-spacing: 1px;
      color: rgba(220,210,190,0.88);
      margin-bottom: 12px;
    }
    #audio-notice .audio-notice-actions {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    #audio-notice button {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid rgba(180,150,80,0.45);
      background: rgba(40,35,25,0.9);
      color: rgba(230,200,120,0.95);
    }
    #audio-notice button:hover {
      background: rgba(60,52,35,0.95);
      border-color: rgba(200,170,100,0.55);
    }
    #audio-notice #audio-notice-close {
      border-color: rgba(120,120,120,0.4);
      color: rgba(180,175,165,0.85);
      background: rgba(25,25,25,0.85);
    }
  </style>
</head>
<body>
  <canvas id="universe-canvas"></canvas>
  <canvas id="gear-canvas"></canvas>
  <canvas id="counter-canvas"></canvas>
  <div id="cursor"></div>
  <div id="phase-label"></div>

  <!-- 音声案内（ミュートは常に有効。閉じるとバナーのみ非表示） -->
  <div id="audio-notice" role="dialog" aria-label="音声の案内">
    <p class="audio-notice-text">
      このコンテンツは音が出ます。<br>
      OFFにする場合は、下の<strong style="color:rgba(230,200,130,0.95)">ミュート</strong>ボタンを押してください。
    </p>
    <div class="audio-notice-actions">
      <button type="button" id="audio-mute-btn" aria-pressed="false">ミュート</button>
      <button type="button" id="audio-notice-close">閉じる</button>
    </div>
  </div>

  <!-- チュートリアル -->
  <div id="tutorial">
    <div id="tutorial-inner">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="tutorial-eyebrow">Googol Visualizer</div>
      <div id="tutorial-main">
        マウスホイールを回すか<br>
        画面を<span class="accent">スワイプ</span>してください<br>
        <br>
        歯車が宇宙の時間を刻みます<br>
        左端が一周するには<br>
        <span class="accent">10<sup style="font-size:9px">9</sup></span>回転が必要です
      </div>
      <div id="tutorial-sub">scroll or swipe to begin</div>
    </div>
  </div>

  <!-- フラッシュ -->
  <div id="event-flash"></div>
  <div id="milestone-msg">
    <span class="title"></span>
    <span class="sub"></span>
  </div>

  <!-- 完走画面 -->
  <div id="goal-screen">
    <div id="goal-inner">
      <div class="goal-corner tl"></div><div class="goal-corner tr"></div>
      <div class="goal-corner bl"></div><div class="goal-corner br"></div>
      <div id="goal-eyebrow">— Congratulations —</div>
      <div id="goal-title">
        あなたは宇宙の時計を<br>一周させました
      </div>
      <div id="goal-body">
        この装置の歯車は <span class="big">10個</span> です<br>
        <br>
        本物の <span class="big">グーゴル可視化装置</span> には<br>
        <span class="big">100個</span> の歯車が必要です<br>
        <br>
        <span class="small">
          あなたが今体験したのは<br>
          グーゴルへの道のり の<br>
          10<sup style="font-size:8px">−91</sup> に過ぎません
        </span>
      </div>
    </div>
  </div>

  <script src="js/canvasDpr.js"></script>
  <script src="js/AssetLoader.js"></script>
  <script src="js/Gear.js"></script>
  <script src="js/TimeController.js"></script>
  <script src="js/UniverseRenderer.js"></script>
  <script src="js/GearRenderer.js"></script>
  <script src="js/CounterRenderer.js"></script>
  <script src="js/InputController.js"></script>
  <script src="js/AudioController.js"></script>
  <script src="js/App.js"></script>
</body>
</html>
