<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googol Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
      font-family: 'Courier New', monospace;
      user-select: none;
    }

    #universe-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #gear-canvas {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 2;
    }

    #counter-canvas {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 3;
      pointer-events: none;
    }

    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 100;
    }

    #phase-label {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.1);
      font-size: 10px;
      letter-spacing: 7px;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
      transition: opacity 2s ease;
      white-space: nowrap;
    }

    /* ─── チュートリアル ─── */
    #tutorial {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    #tutorial.fade-out { opacity: 0; }

    #tutorial-inner {
      text-align: center;
      padding: 52px 68px 44px;
      max-width: 460px;
      position: relative;
    }

    /* 四隅の線 */
    #tutorial-inner::before, #tutorial-inner::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(180,160,100,0.2);
      border-style: solid;
    }
    #tutorial-inner::before {
      top: 0; left: 0;
      border-width: 1px 0 0 1px;
    }
    #tutorial-inner::after {
      bottom: 0; right: 0;
      border-width: 0 1px 1px 0;
    }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 24px; height: 24px;
      border-color: rgba(180,160,100,0.2);
      border-style: solid;
    }
    .corner-tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }

    #tutorial-eyebrow {
      font-size: 9px;
      letter-spacing: 6px;
      color: rgba(180,150,80,0.4);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    #tutorial-main {
      font-size: 12px;
      line-height: 2.6;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
    }

    #tutorial-main .accent {
      color: rgba(200,180,120,0.5);
    }

    #tutorial-sub {
      margin-top: 40px;
      font-size: 8px;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.08);
      text-transform: uppercase;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* ─── フラッシュオーバーレイ ─── */
    #event-flash {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #event-flash.active { opacity: 1; transition: opacity 0.15s ease; }

    /* ─── マイルストーンメッセージ ─── */
    #milestone-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 22;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      white-space: nowrap;
    }
    #milestone-msg.active { opacity: 1; }
    #milestone-msg .title {
      font-size: 10px;
      letter-spacing: 8px;
      color: rgba(220,200,140,0.7);
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }
    #milestone-msg .sub {
      font-size: 8px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.2);
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="universe-canvas"></canvas>
  <canvas id="gear-canvas"></canvas>
  <canvas id="counter-canvas"></canvas>
  <div id="cursor"></div>
  <div id="phase-label"></div>

  <!-- チュートリアル -->
  <div id="tutorial">
    <div id="tutorial-inner">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div id="tutorial-eyebrow">Googol Visualizer</div>
      <div id="tutorial-main">
        <span class="accent">ホイールを回す</span>か<br>
        画面を<span class="accent">スワイプ</span>してください<br>
        <br>
        歯車が宇宙の時間を刻みます<br>
        左端が一周するまでの道のりに<br>
        <span class="accent">10<sup style="font-size:9px">100</sup></span> 回転が必要です
      </div>
      <div id="tutorial-sub">scroll or swipe to begin</div>
    </div>
  </div>

  <!-- フラッシュ -->
  <div id="event-flash"></div>
  <div id="milestone-msg">
    <span class="title"></span>
    <span class="sub"></span>
  </div>

  <script src="js/Gear.js"></script>
  <script src="js/TimeController.js"></script>
  <script src="js/UniverseRenderer.js"></script>
  <script src="js/GearRenderer.js"></script>
  <script src="js/CounterRenderer.js"></script>
  <script src="js/InputController.js"></script>
  <script src="js/AudioController.js"></script>
  <script src="js/App.js"></script>
</body>
</html>
